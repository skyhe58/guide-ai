# =============================================================================
# 基础服务：Ollama（本地 LLM 推理）+ Chroma（向量数据库）
# 用途：为 code-examples/02-llm/ 和 code-examples/03-ai-apps/ 提供服务依赖
#
# 启动命令：
#   docker compose -f docker/docker-compose.yml up -d
#
# 启动单个服务：
#   docker compose -f docker/docker-compose.yml up -d ollama
#   docker compose -f docker/docker-compose.yml up -d chroma
#
# 停止服务：
#   docker compose -f docker/docker-compose.yml down
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Ollama — 本地 LLM 推理服务
  # 端口：11434
  # 对应代码模块：02-llm/deployment, 03-ai-apps/
  # Python 依赖：ollama (Python SDK)
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: guide-ai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # GPU 支持（可选，需要 NVIDIA Container Toolkit）
    # 如果没有 GPU，注释掉 deploy 部分即可正常运行（CPU 模式）
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ---------------------------------------------------------------------------
  # Chroma — 向量数据库
  # 端口：8000
  # 对应代码模块：03-ai-apps/rag
  # Python 依赖：chromadb
  # ---------------------------------------------------------------------------
  chroma:
    image: chromadb/chroma:latest
    container_name: guide-ai-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  ollama_data:
    name: guide-ai-ollama-data
  chroma_data:
    name: guide-ai-chroma-data
